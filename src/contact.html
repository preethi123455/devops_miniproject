<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Cartify</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .contact-container {
            max-width: 800px;
            margin: 4rem auto;
            background: white;
            padding: 3rem;
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        .contact-info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }
        .info-item h4 {
            color: var(--primary);
            margin-bottom: 0.5rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo-wrapper">
                <div class="logo-icon">🛒</div>
                <span>Cartify</span>
            </a>
            <nav>
                <a href="products.html">Shop</a>
                <a href="orders.html">Orders</a>
                <a href="cart.html" class="cart-btn">
                    🛒 Cart
                    <span class="cart-count">0</span>
                </a>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="contact-container">
            <h1 class="mb-3 text-center">Contact Us</h1>
            <p class="text-muted text-center mb-5">Have questions? We're here to help you 24/7.</p>

            <div class="contact-info-grid">
                <div class="info-item">
                    <h4>📧 Email Support</h4>
                    <p>support@cartify.com</p>
                    <p>sales@cartify.com</p>
                </div>
                <div class="info-item">
                    <h4>📞 Phone</h4>
                    <p>+1 (555) 123-4567</p>
                    <p>Mon - Fri, 9am - 6pm</p>
                </div>
                <div class="info-item">
                    <h4>📍 Office</h4>
                    <p>123 DevOps Lane</p>
                    <p>Cloud City, CA 94105</p>
                </div>
            </div>

            <form>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label>Subject</label>
                    <input type="text" placeholder="How can we help?">
                </div>
                <div class="form-group">
                    <label>Message</label>
                    <textarea rows="5" placeholder="Your message here..."></textarea>
                </div>
                <button type="button" class="btn btn-primary w-100" onclick="alert('Message sent! Our team will get back to you soon.')">Send Message</button>
            </form>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Cartify. All rights reserved.</p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
