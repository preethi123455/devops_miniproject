<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - MicroShop</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; }
        header { background-color: #333; color: white; padding: 1rem; text-align: center; }
        nav { display: flex; justify-content: center; background-color: #444; }
        nav a { color: white; padding: 1rem; text-decoration: none; }
        nav a:hover { background-color: #555; }
        .container { padding: 2rem; max-width: 600px; margin: auto; background: white; margin-top: 2rem; border-radius: 5px; }
        form { display: flex; flex-direction: column; }
        input, textarea { margin-bottom: 1rem; padding: 0.5rem; border: 1px solid #ccc; border-radius: 3px; }
        button { background-color: #28a745; color: white; border: none; padding: 0.75rem; cursor: pointer; border-radius: 3px; }
        button:hover { background-color: #218838; }
    </style>
</head>
<body>
    <header>
        <h1>Contact MicroShop</h1>
    </header>
    <nav>
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="contact.html">Contact Us</a>
    </nav>
    <div class="container">
        <h2>Get in Touch</h2>
        <form action="#" method="get">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
            
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            
            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="4" required></textarea>
            
            <button type="submit">Send Message</button>
        </form>
    </div>
</body>
</html>
